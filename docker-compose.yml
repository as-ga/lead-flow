services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: lead-flow-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - lead-flow-network
    restart: unless-stopped

  # Node.js Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lead-flow-server
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/lead-flow?authSource=admin
      JWT_SECRET: leadflow_jwt_secret_key_2026_production_change_this
      JWT_REFRESH_SECRET: leadflow_jwt_refresh_secret_key_2026_production_change_this
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_started
    networks:
      - lead-flow-network
    restart: unless-stopped

  # Next.js Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: lead-flow-client
    environment:
      NEXT_PUBLIC_API_URL: http://server:5000/api
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_started
    networks:
      - lead-flow-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  lead-flow-network:
    driver: bridge
